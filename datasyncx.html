          const containerRef = useRef(null);

          useEffect(() => {

            // --- Scene Setup ---
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            const container = containerRef.current;
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
            container.appendChild(renderer.domElement);

            // --- Shader Material ---
            // This GLSL shader creates the smooth, continuous gradient mist
            const material = new THREE.ShaderMaterial({
              uniforms: {
                uTime: { value: 0 },
                uMouse: { value: new THREE.Vector2(0.5, 0.5) },
                uResolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) },
                uColor1: { value: new THREE.Color(0xa855f7) }, // Purple
                uColor2: { value: new THREE.Color(0x22d3ee) }, // Cyan
                uColorBg: { value: new THREE.Color(0x020617) }, // Background Dark Blue
              },
              vertexShader: `
                varying vec2 vUv;
                void main() {
                  vUv = uv;
                  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
              `,
              fragmentShader: `
                uniform float uTime;
                uniform vec2 uMouse;
                uniform vec2 uResolution;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColorBg;
                varying vec2 vUv;
                // Simplex 2D noise function
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                float snoise(vec2 v){
                  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                           -0.577350269189626, 0.024390243902439);
                  vec2 i  = floor(v + dot(v, C.yy) );
                  vec2 x0 = v -   i + dot(i, C.xx);
                  vec2 i1;
                  i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                  vec4 x12 = x0.xyxy + C.xxzz;
                  x12.xy -= i1;
                  i = mod(i, 289.0);
                  vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                  + i.x + vec3(0.0, i1.x, 1.0 ));
                  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                  m = m*m ;
                  m = m*m ;
                  vec3 x = 2.0 * fract(p * C.www) - 1.0;
                  vec3 h = abs(x) - 0.5;
                  vec3 ox = floor(x + 0.5);
                  vec3 a0 = x - ox;
                  m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                  vec3 g;
                  g.x  = a0.x  * x0.x  + h.x  * x0.y;
                  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                  return 130.0 * dot(m, g);
                }
                void main() {
                  vec2 uv = vUv;
                  float aspect = uResolution.x / uResolution.y;
                  vec2 aspectUV = uv;
                  aspectUV.x *= aspect;
                  vec2 mouse = uMouse;
                  mouse.x *= aspect;
                  float noise1 = snoise(uv * 3.0 + uTime * 0.1);
                  float noise2 = snoise(uv * 6.0 - uTime * 0.15);
                  float dist = distance(aspectUV, mouse);
                  float interaction = smoothstep(0.5, 0.0, dist); 
                  vec2 warpedUV = uv + vec2(noise1, noise2) * 0.1;
                  warpedUV -= (aspectUV - mouse) * interaction * 0.2; 
                  float shape = snoise(warpedUV * 2.0 + uTime * 0.1);
                  float alpha = smoothstep(0.2, 0.8, shape);
                  vec3 finalColor = mix(uColorBg, uColor1, alpha * 0.4); 
                  finalColor = mix(finalColor, uColor2, interaction * 0.5 + snoise(uv * 10.0 + uTime) * 0.1 * alpha); 
                  float vignette = 1.0 - smoothstep(0.5, 1.5, distance(uv, vec2(0.5)));
                  gl_FragColor = vec4(finalColor, 1.0); 
                }
              `,
              transparent: true
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const plane = new THREE.Mesh(geometry, material);
            scene.add(plane);

            const onMouseMove = (event) => {
              const rect = container.getBoundingClientRect();
              const x = (event.clientX - rect.left) / rect.width;
              const y = 1.0 - (event.clientY - rect.top) / rect.height; 
              material.uniforms.uMouse.value.set(x, y);
            };

            window.addEventListener('mousemove', onMouseMove);

            let time = 0;
            const animate = () => {
              time += 0.01;
              material.uniforms.uTime.value = time;
              renderer.render(scene, camera);
              requestAnimationFrame(animate);
            };
            animate();

            const handleResize = () => {
              if (!container) return;
              renderer.setSize(container.clientWidth, container.clientHeight);
              material.uniforms.uResolution.value.set(container.clientWidth, container.clientHeight);
            };
            window.addEventListener('resize', handleResize);

            return () => {
              window.removeEventListener('mousemove', onMouseMove);
              window.removeEventListener('resize', handleResize);
              if (container && renderer.domElement) {
                container.removeChild(renderer.domElement);
              }
              geometry.dispose();
              material.dispose();
            };

    // Capabilities Navigation & Progress Functionality
    (function() {
        const horizontalNav = document.getElementById('capabilitiesHorizontalNav');
        const verticalProgress = document.getElementById('capabilitiesVerticalProgress');
        const progressFill = document.getElementById('capabilitiesProgressFill');
        const navItems = document.querySelectorAll('.capabilities-horizontal-nav-item');
        const sections = ['import', 'cloning', 'manager', 'cleansing'];

        let isActive = false;

        function updateNavAndProgress() {
            const capabilitiesSection = document.getElementById('capabilities');
            const importSection = document.getElementById('import');
            const cleansingSection = document.getElementById('cleansing');
            const resourcesSection = document.getElementById('resources');

            if (!capabilitiesSection || !importSection || !cleansingSection) {
                setTimeout(updateNavAndProgress, 100);
                return;
            }

            const scrollPos = window.scrollY;
            const viewportHeight = window.innerHeight;

            const capabilitiesBottom = capabilitiesSection.offsetTop + capabilitiesSection.offsetHeight;
            const importTop = importSection.offsetTop;
            const cleansingBottom = cleansingSection.offsetTop + cleansingSection.offsetHeight;

            // Hide when cleansing section is near the Evidence section
            // Calculate based on the gap between sections
            let hideNavEnd = cleansingBottom;

            if (resourcesSection) {
                const resourcesTop = resourcesSection.offsetTop;
                const gapBetweenSections = resourcesTop - cleansingBottom;
                // Hide when scroll reaches halfway through the gap between sections
                hideNavEnd = cleansingBottom + (gapBetweenSections * 0.5);
            }

            const showNavStart = capabilitiesBottom - 300;

            if (scrollPos >= showNavStart && scrollPos <= hideNavEnd) {
                if (!isActive) {
                    document.body.classList.add('show-capabilities-nav');
                    isActive = true;
                }

                const totalHeight = cleansingBottom - importTop;
                const currentProgress = Math.max(0, scrollPos - importTop);
                const progressPercent = Math.max(0, Math.min(100, (currentProgress / totalHeight) * 100));

                if (progressFill) {
                    progressFill.style.height = progressPercent + '%';
                }

                let activeSection = null;

                for (const sectionId of sections) {
                    const section = document.getElementById(sectionId);
                    if (section) {
                        const sectionTop = section.offsetTop;
                        const sectionBottom = sectionTop + section.offsetHeight;
                        const sectionCenter = sectionTop + (section.offsetHeight / 2);
                        const viewportCenter = scrollPos + (viewportHeight / 2);

                        if (Math.abs(sectionCenter - viewportCenter) < section.offsetHeight / 2 + viewportHeight / 4) {
                            activeSection = sectionId;
                        }
                    }
                }

                navItems.forEach(item => {
                    const target = item.getAttribute('data-target');
                    if (target === activeSection) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

            } else {
                if (isActive) {
                    document.body.classList.remove('show-capabilities-nav');
                    isActive = false;
                }
            }
        }

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                const target = this.getAttribute('data-target');
                const section = document.getElementById(target);
                if (section) {
                    window.scrollTo({
                        top: section.offsetTop - 100,
                        behavior: 'smooth'
                    });
                }
            });
        });

        let ticking = false;
        window.addEventListener('scroll', function() {
            if (!ticking) {
                window.requestAnimationFrame(function() {
                    updateNavAndProgress();
                    ticking = false;
                });
                ticking = true;
            }
        });

        setTimeout(updateNavAndProgress, 500);

        const observer = new MutationObserver(function() {
            setTimeout(updateNavAndProgress, 100);
        });

        const targetNode = document.getElementById('root');
        if (targetNode) {
            observer.observe(targetNode, { childList: true, subtree: true });
        }
    })();
    </script>
</body>
</html>
